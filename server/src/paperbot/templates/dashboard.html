<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PaperBot Dashboard</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%9A%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ================================================================
       CSS VARIABLES — Dual Theme System
       ================================================================ */
    :root {
      /* Typography */
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;

      /* Dark theme (default) — warm slate, readable */
      --bg-primary: #2a2d35;
      --bg-secondary: #343842;
      --bg-tertiary: #3e424d;
      --bg-elevated: #484d59;
      --bg-hover: #525865;
      --border-subtle: #5c6270;
      --border-default: #6e7585;
      --text-primary: #f5f3ef;
      --text-secondary: #d8d4cc;
      --text-tertiary: #b0aa9e;
      --text-muted: #8a8478;
      --accent: #e8b84d;
      --accent-hover: #f0c868;
      --accent-dim: rgba(232, 184, 77, 0.22);
      --accent-glow: rgba(232, 184, 77, 0.12);
      --success: #5a9e6e;
      --success-bg: rgba(90, 158, 110, 0.12);
      --error: #c45a5a;
      --error-bg: rgba(196, 90, 90, 0.12);
      --warning: #c9a04a;
      --warning-bg: rgba(201, 160, 74, 0.12);
      --info: #5a8ec4;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --transition-fast: 0.15s ease;
      --transition-base: 0.25s ease;
      --transition-slow: 0.4s ease;
    }

    [data-theme="light"] {
      --bg-primary: #f0ede7;
      --bg-secondary: #f7f5f0;
      --bg-tertiary: #eae7e0;
      --bg-elevated: #ffffff;
      --bg-hover: #e2dfd8;
      --border-subtle: #d4cfc5;
      --border-default: #bfbab0;
      --text-primary: #2a2822;
      --text-secondary: #5c5748;
      --text-tertiary: #8a8470;
      --text-muted: #b0a898;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --accent-dim: rgba(37, 99, 235, 0.08);
      --accent-glow: rgba(37, 99, 235, 0.05);
      --success: #2d7a4a;
      --success-bg: rgba(45, 122, 74, 0.08);
      --error: #c0392b;
      --error-bg: rgba(192, 57, 43, 0.08);
      --warning: #b8860b;
      --warning-bg: rgba(184, 134, 11, 0.08);
      --info: #2d5a8e;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.1);
    }

    /* ================================================================
       BASE RESET
       ================================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 15px;
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-body);
      font-weight: 400;
      line-height: 1.6;
      color: var(--text-primary);
      background: var(--bg-primary);
      min-height: 100vh;
      transition: background var(--transition-slow), color var(--transition-slow);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    ::selection {
      background: var(--accent-dim);
      color: var(--text-primary);
    }

    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border-default);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-tertiary);
    }

    /* ================================================================
       LAYOUT
       ================================================================ */
    .app {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    @media (max-width: 640px) {
      .app { padding: 1rem 1rem 3rem; }
    }

    /* ================================================================
       HEADER
       ================================================================ */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 1.5rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border-subtle);
      animation: fadeSlideDown 0.6s ease both;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--accent-dim);
      border-radius: var(--radius-sm);
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .brand-title {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    .brand-sub {
      font-size: 0.7rem;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 500;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .last-updated {
      font-size: 0.75rem;
      color: var(--text-tertiary);
      font-family: var(--font-mono);
      white-space: nowrap;
    }

    /* Theme Toggle */
    .theme-toggle {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-subtle);
      background: var(--bg-secondary);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      transition: all var(--transition-fast);
      flex-shrink: 0;
    }
    .theme-toggle:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
      border-color: var(--border-default);
    }

    /* ================================================================
       SECTIONS
       ================================================================ */
    .section {
      margin-bottom: 2.5rem;
      animation: fadeSlideUp 0.6s ease both;
    }
    .section:nth-child(2) { animation-delay: 0.05s; }
    .section:nth-child(3) { animation-delay: 0.1s; }
    .section:nth-child(4) { animation-delay: 0.15s; }
    .section:nth-child(5) { animation-delay: 0.2s; }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .section-title {
      font-family: var(--font-display);
      font-size: 1.35rem;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    /* ================================================================
       BUTTONS
       ================================================================ */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      padding: 0.5rem 1rem;
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all var(--transition-fast);
      white-space: nowrap;
      line-height: 1.4;
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .btn-primary:hover:not(:disabled) {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 2px 8px var(--accent-glow);
    }

    .btn-secondary {
      background: var(--bg-elevated);
      color: var(--text-primary);
      border-color: var(--border-default);
    }
    .btn-secondary:hover:not(:disabled) {
      background: var(--bg-hover);
      border-color: var(--accent);
      color: var(--text-primary);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      border-color: transparent;
      padding: 0.25rem 0.5rem;
      font-size: 0.75rem;
      font-weight: 500;
    }
    .btn-ghost:hover:not(:disabled) {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .btn-sm {
      padding: 0.3rem 0.6rem;
      font-size: 0.72rem;
    }

    .btn-group {
      display: flex;
      gap: 0.4rem;
    }

    /* ================================================================
       STATS GRID
       ================================================================ */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 0.75rem;
    }

    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 480px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .stat-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      min-width: 0;
      padding: 1rem 0.65rem;
      text-align: center;
      transition: all var(--transition-base);
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--accent);
      opacity: 0;
      transition: opacity var(--transition-base);
    }
    .stat-card:hover {
      border-color: var(--border-default);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }
    .stat-card:hover::before {
      opacity: 1;
    }

    .stat-card .number {
      font-family: var(--font-display);
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.1;
      letter-spacing: -0.02em;
    }
    .stat-card .label {
      font-size: 0.66rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 500;
      margin-top: 0.3rem;
      white-space: nowrap;
    }

    .track-breakdown {
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border-subtle);
    }
    .track-breakdown-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.2rem 0;
      font-size: 0.8rem;
    }
    .track-breakdown-row .track-name {
      color: var(--text-secondary);
    }
    .track-breakdown-row .track-count {
      font-weight: 600;
      color: var(--text-primary);
      font-family: var(--font-display);
      font-size: 0.9rem;
    }

    .track-pills {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .track-pill {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.78rem;
      color: var(--text-secondary);
    }
    .track-pill .count {
      font-weight: 600;
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 0.85rem;
    }

    /* ================================================================
       TABS
       ================================================================ */
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 1rem;
      border-bottom: 1px solid var(--border-subtle);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab-btn {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-tertiary);
      cursor: pointer;
      padding: 0.6rem 1rem;
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-weight: 500;
      transition: all var(--transition-fast);
      white-space: nowrap;
      position: relative;
    }
    .tab-btn:hover {
      color: var(--text-secondary);
    }
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ================================================================
       FILTER BAR
       ================================================================ */
    .filter-bar {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
      align-items: center;
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 0.6rem 0.75rem;
    }

    .filter-bar input[type="search"],
    .filter-bar select {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 0.82rem;
      padding: 0.45rem 0.7rem;
      outline: none;
      transition: all var(--transition-fast);
    }
    .filter-bar input[type="search"]::placeholder {
      color: var(--text-muted);
    }
    .filter-bar input[type="search"]:focus,
    .filter-bar select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .filter-bar input[type="search"] {
      flex: 1;
      min-width: 180px;
    }
    .filter-bar select {
      width: auto;
      min-width: 110px;
      cursor: pointer;
    }

    .paper-count {
      font-size: 0.8rem;
      color: var(--text-tertiary);
      font-weight: 500;
      white-space: nowrap;
      margin-left: auto;
    }

    /* ================================================================
       PAPER LIST
       ================================================================ */
    .paper-list {
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .paper-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      padding: 1rem 1.1rem;
      border-bottom: 1px solid var(--border-subtle);
      transition: background var(--transition-fast);
      animation: fadeIn 0.3s ease both;
    }
    .paper-row:last-child { border-bottom: none; }
    .paper-row:hover {
      background: var(--bg-tertiary);
    }

    .paper-content {
      flex: 1;
      min-width: 0;
    }

    .paper-title {
      font-weight: 600;
      font-size: 0.92rem;
      line-height: 1.45;
      margin-bottom: 0.3rem;
      color: var(--text-primary);
    }
    .paper-title a {
      cursor: pointer;
      color: inherit;
      text-decoration: none;
      transition: color var(--transition-fast);
      border-bottom: 1px solid transparent;
    }
    .paper-title a:hover {
      color: var(--accent);
      border-bottom-color: var(--accent-dim);
    }

    .paper-meta {
      font-size: 0.78rem;
      color: var(--text-tertiary);
      line-height: 1.6;
    }
    .paper-meta .sep {
      margin: 0 0.3rem;
      color: var(--text-muted);
    }

    .paper-actions {
      display: flex;
      gap: 0.3rem;
      flex-shrink: 0;
      align-items: flex-start;
      padding-top: 0.1rem;
    }

    /* ================================================================
       BADGES & TAGS
       ================================================================ */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.15rem 0.5rem;
      border-radius: 100px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      line-height: 1.4;
      vertical-align: middle;
    }
    .badge svg {
      width: 10px;
      height: 10px;
    }

    .badge-pending {
      background: rgba(160, 155, 140, 0.12);
      color: var(--text-tertiary);
      border: 1px solid var(--border-subtle);
    }
    [data-theme="light"] .badge-pending {
      background: #f0ede8;
      color: #6b6558;
      border-color: #d4cfc5;
    }

    .badge-read {
      background: var(--success-bg);
      color: var(--success);
      border: 1px solid rgba(90, 158, 110, 0.2);
    }

    .badge-starred {
      background: var(--warning-bg);
      color: var(--warning);
      border: 1px solid rgba(201, 160, 74, 0.2);
    }

    .badge-skip {
      background: var(--error-bg);
      color: var(--error);
      border: 1px solid rgba(196, 90, 90, 0.2);
    }

    .badge-recommended {
      background: rgba(37, 99, 235, 0.1);
      color: var(--info);
      border: 1px solid rgba(37, 99, 235, 0.2);
    }

    .track-tag {
      display: inline-flex;
      align-items: center;
      font-size: 0.65rem;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      line-height: 1.4;
    }
    /* Track tag colors are injected dynamically via JS based on config */

    .venue-tag {
      display: inline-flex;
      align-items: center;
      font-size: 0.68rem;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      font-weight: 700;
      letter-spacing: 0.04em;
      font-family: var(--font-mono);
      line-height: 1.4;
    }
    .venue-tag.t1 { background: #6b4423; color: #f0dcc8; }
    .venue-tag.t2 { background: #1e3a5f; color: #c8d8f0; }
    .venue-tag.t3 { background: #3a3a3a; color: #c8c8c8; }
    .venue-tag.t0 { background: var(--bg-hover); color: var(--text-tertiary); }
    .venue-tag.others { background: var(--bg-hover); color: var(--text-tertiary); }
    .venue-tag.arxiv { background: #3d5a80; color: #e0f0ff; }
    [data-theme="light"] .venue-tag.t1 { background: #fef3c7; color: #6b4423; }
    [data-theme="light"] .venue-tag.t2 { background: #dbeafe; color: #1e3a5f; }
    [data-theme="light"] .venue-tag.t3 { background: #e5e7eb; color: #3a3a3a; }
    [data-theme="light"] .venue-tag.t0 { background: #f0ede8; color: #8a8270; }
    [data-theme="light"] .venue-tag.others { background: #f0ede8; color: #8a8270; }
    [data-theme="light"] .venue-tag.arxiv { background: #dbeafe; color: #1e3a5f; }

    .preprint-tag {
      display: inline-flex;
      align-items: center;
      font-size: 0.68rem;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      font-weight: 700;
      letter-spacing: 0.04em;
      font-family: var(--font-mono);
      line-height: 1.4;
      background: #3d5a80;
      color: #e0f0ff;
    }
    [data-theme="light"] .preprint-tag {
      background: #dbeafe;
      color: #1e3a5f;
    }

    /* ================================================================
       PAGINATION
       ================================================================ */
    .pagination {
      display: flex;
      gap: 0.35rem;
      justify-content: center;
      margin-top: 1.25rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .page-btn {
      padding: 0.35rem 0.7rem;
      font-size: 0.8rem;
      font-weight: 500;
      border: 1px solid var(--border-subtle);
      background: var(--bg-secondary);
      color: var(--text-secondary);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--transition-fast);
      font-family: var(--font-body);
      min-width: 34px;
      text-align: center;
    }
    .page-btn:hover:not(:disabled) {
      background: var(--bg-hover);
      color: var(--text-primary);
      border-color: var(--border-default);
    }
    .page-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .page-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .page-jump {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      margin-left: 0.5rem;
    }
    .page-jump input {
      width: 50px;
      padding: 0.35rem 0.4rem;
      font-size: 0.8rem;
      text-align: center;
      border: 1px solid var(--border-subtle);
      background: var(--bg-secondary);
      color: var(--text-primary);
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      outline: none;
    }
    .page-jump input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-dim);
    }

    /* ================================================================
       RECOMMENDATION HISTORY
       ================================================================ */
    .history-group {
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      margin-bottom: 0.6rem;
      overflow: hidden;
      transition: all var(--transition-base);
    }
    .history-group:hover {
      border-color: var(--border-default);
    }

    .history-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.7rem 1rem;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.88rem;
      color: var(--text-primary);
      transition: background var(--transition-fast);
      user-select: none;
    }
    .history-summary:hover {
      background: var(--bg-tertiary);
    }
    .history-summary::before {
      content: '';
      display: inline-block;
      width: 0;
      height: 0;
      border-left: 5px solid var(--text-tertiary);
      border-top: 4px solid transparent;
      border-bottom: 4px solid transparent;
      margin-right: 0.6rem;
      transition: transform var(--transition-fast);
    }
    .history-group[open] .history-summary::before {
      transform: rotate(90deg);
    }

    .history-items {
      padding: 0 1rem 0.75rem;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.4rem 0;
      border-bottom: 1px solid var(--border-subtle);
      font-size: 0.85rem;
      transition: background var(--transition-fast);
    }
    .history-item:last-child { border-bottom: none; }
    .history-item:hover {
      background: var(--bg-tertiary);
      margin: 0 -1rem;
      padding-left: 1rem;
      padding-right: 1rem;
    }

    .history-item-rank {
      font-weight: 600;
      min-width: 1.5rem;
      color: var(--text-tertiary);
      font-family: var(--font-mono);
      font-size: 0.78rem;
    }

    .history-item-title {
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
      color: var(--text-secondary);
      transition: color var(--transition-fast);
    }
    .history-item-title:hover {
      color: var(--accent);
    }

    .history-item-meta {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-shrink: 0;
      margin-left: 0.5rem;
    }
    .history-item-score {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }

    /* ================================================================
       RECENT READS
       ================================================================ */
    .recent-read-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 1.1rem;
      margin-bottom: 0.6rem;
      border-left: 3px solid var(--accent);
      transition: all var(--transition-base);
      animation: fadeIn 0.4s ease both;
    }
    .recent-read-card:hover {
      border-color: var(--border-default);
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }

    .recent-read-rank {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
      margin-right: 0.3rem;
    }

    .recent-read-title {
      font-weight: 600;
      font-size: 0.92rem;
      line-height: 1.4;
      margin-bottom: 0.25rem;
    }
    .recent-read-title a {
      cursor: pointer;
      color: var(--text-primary);
      text-decoration: none;
      transition: color var(--transition-fast);
    }
    .recent-read-title a:hover {
      color: var(--accent);
    }

    .recent-read-abstract {
      margin-top: 0.5rem;
      font-size: 0.85rem;
      line-height: 1.55;
      color: var(--text-secondary);
    }

    /* ================================================================
       EMPTY STATE
       ================================================================ */
    .empty-msg {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* ================================================================
       TOAST
       ================================================================ */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      padding: 0.8rem 1.25rem;
      border-radius: var(--radius-md);
      color: #fff;
      z-index: 2000;
      font-size: 0.85rem;
      font-weight: 500;
      animation: toastIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
      box-shadow: var(--shadow-lg);
      max-width: 360px;
      word-break: break-word;
    }
    .toast.success { background: var(--success); }
    .toast.error { background: var(--error); }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(16px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ================================================================
       MODAL
       ================================================================ */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.65);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1500;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.25s ease, visibility 0.25s ease;
      backdrop-filter: blur(4px);
      padding: 1rem;
    }
    [data-theme="light"] .modal-overlay {
      background: rgba(0,0,0,0.4);
    }
    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal-content {
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      max-width: 800px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 1.75rem;
      position: relative;
      transform: translateY(20px) scale(0.98);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: var(--shadow-lg);
    }
    .modal-overlay.active .modal-content {
      transform: translateY(0) scale(1);
    }

    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1.25rem;
      background: none;
      border: none;
      font-size: 1.6rem;
      cursor: pointer;
      color: var(--text-muted);
      line-height: 1;
      padding: 0;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-sm);
      transition: all var(--transition-fast);
    }
    .modal-close:hover {
      color: var(--text-primary);
      background: var(--bg-hover);
    }

    .modal-header {
      margin-bottom: 1.25rem;
      padding-right: 2.5rem;
    }
    .modal-title {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 700;
      margin: 0 0 0.5rem 0;
      line-height: 1.35;
      letter-spacing: -0.01em;
      color: var(--text-primary);
    }
    .modal-meta {
      font-size: 0.82rem;
      color: var(--text-tertiary);
      line-height: 1.6;
    }

    .modal-section {
      margin-bottom: 1.25rem;
    }
    .modal-section h4 {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 600;
      color: var(--text-muted);
      margin: 0 0 0.4rem 0;
    }
    .modal-section p {
      margin: 0;
      line-height: 1.65;
      color: var(--text-secondary);
      font-size: 0.88rem;
    }
    .modal-section a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid var(--accent-dim);
      transition: all var(--transition-fast);
      word-break: break-all;
    }
    .modal-section a:hover {
      border-bottom-color: var(--accent);
    }

    .modal-note-input {
      width: 100%;
      padding: 0.7rem 0.9rem;
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      background: var(--bg-tertiary);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 0.88rem;
      line-height: 1.6;
      resize: vertical;
      outline: none;
      transition: all var(--transition-fast);
      margin-bottom: 0.5rem;
    }
    .modal-note-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .modal-note-input::placeholder {
      color: var(--text-muted);
    }

    .modal-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 1.5rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border-subtle);
      flex-wrap: wrap;
    }

    /* ================================================================
       ANIMATIONS
       ================================================================ */
    @keyframes fadeSlideDown {
      from { opacity: 0; transform: translateY(-12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* ================================================================
       UTILITIES
       ================================================================ */
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="brand">
        <div class="brand-icon">📚</div>
        <div>
          <div class="brand-title">PaperBot</div>
          <div class="brand-sub">Daily Paper Recommendations</div>
        </div>
      </div>
      <div class="header-actions">
        <span class="last-updated" id="last-updated">Loading...</span>
        <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
          <span id="theme-icon">☀️</span>
        </button>
      </div>
    </header>

    <!-- Overview -->
    <section class="section">
      <div class="section-header">
        <h2 class="section-title">Overview</h2>
        <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;">
          <div class="track-pills" id="track-pills"></div>
          <div class="btn-group">
            <button id="recommend-btn" class="btn btn-primary" onclick="recommendPapers()">✨ Recommend</button>
            <button id="update-btn" class="btn btn-secondary" onclick="updatePapers()">🔄 Fetch</button>
          </div>
        </div>
      </div>
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card"><div class="number">-</div><div class="label">Total</div></div>
      </div>
    </section>

    <!-- Recommendation History -->
    <section class="section">
      <h2 class="section-title">Recommendation History</h2>
      <div id="recommendation-history">
        <div class="empty-msg">Loading...</div>
      </div>
    </section>

    <!-- Recent Reads -->
    <section class="section">
      <h2 class="section-title">Recent Reads</h2>
      <div id="recent-reads">
        <div class="empty-msg">Loading...</div>
      </div>
    </section>

    <!-- Papers -->
    <section class="section">
      <div class="section-header">
        <h2 class="section-title">Papers</h2>
      </div>
      <div class="tabs">
        <button class="tab-btn active" data-tab="pending" onclick="switchTab('pending')">Pending</button>
        <button class="tab-btn" data-tab="recommended" onclick="switchTab('recommended')">Recommended</button>
        <button class="tab-btn" data-tab="read" onclick="switchTab('read')">Read</button>
        <button class="tab-btn" data-tab="starred" onclick="switchTab('starred')">Starred</button>
        <button class="tab-btn" data-tab="skip" onclick="switchTab('skip')">Skipped</button>
        <button class="tab-btn" data-tab="all" onclick="switchTab('all')">All</button>
      </div>
      <div class="filter-bar">
        <input type="search" id="keyword" placeholder="Search title or abstract...">
        <select id="track-filter">
          <option value="">All Tracks</option>
        </select>
        <select id="sort-by">
          <option value="score">Score</option>
          <option value="publication_date">Date</option>
          <option value="cited_by_count">Citations</option>
          <option value="title">Title</option>
          <option value="changed_at">Mark Time</option>
        </select>
        <select id="sort-order">
          <option value="desc">Desc</option>
          <option value="asc">Asc</option>
        </select>
        <span class="paper-count" id="paper-count"></span>
      </div>
      <div class="paper-list" id="papers-list">
        <div class="empty-msg">Loading...</div>
      </div>
      <div class="pagination" id="pagination"></div>
    </section>
  </div>

  <!-- Paper Detail Modal -->
  <div class="modal-overlay" id="paper-modal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="hidePaperDetail()">&times;</button>
      <div class="modal-header">
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-meta" id="modal-meta"></div>
      </div>
      <div class="modal-section">
        <h4>Authors</h4>
        <p id="modal-authors"></p>
      </div>
      <div class="modal-section">
        <h4>Abstract</h4>
        <p id="modal-abstract"></p>
      </div>
      <div class="modal-section">
        <h4>Links</h4>
        <p id="modal-links"></p>
      </div>
      <div class="modal-section">
        <h4>Personal Notes</h4>
        <textarea class="modal-note-input" id="modal-note-input" rows="4" placeholder="Write your notes about this paper..."></textarea>
        <div style="display:flex;justify-content:flex-end;">
          <button class="btn btn-primary" onclick="savePaperNote()" id="modal-note-save">Save Note</button>
        </div>
      </div>
      <div class="modal-actions" id="modal-actions"></div>
    </div>
  </div>

  <script>
    const API = '';
    let currentTab = 'pending';
    let currentOffset = 0;
    let currentTotal = 0;
    let currentPaperId = '';
    const PAGE_SIZE = 20;

    // Dynamic track configuration loaded from backend
    let TRACK_CONFIG = {};

    /* ================================================================
       THEME SYSTEM
       ================================================================ */
    function initTheme() {
      const hashTheme = location.hash === '#light' ? 'light' : location.hash === '#dark' ? 'dark' : null;
      const saved = localStorage.getItem('paperbot-theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = hashTheme || saved || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
      updateThemeIcon(theme);
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('paperbot-theme', next);
      updateThemeIcon(next);
    }

    function updateThemeIcon(theme) {
      const icon = document.getElementById('theme-icon');
      if (icon) icon.textContent = theme === 'dark' ? '☀️' : '🌙';
    }

    initTheme();

    /* ================================================================
       API HELPERS
       ================================================================ */
    async function api(path) {
      const r = await fetch(API + path);
      if (!r.ok) throw new Error(await r.text());
      return r.json();
    }

	    async function postApi(path, body) {
	      const r = await fetch(API + path, {
	        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!r.ok) throw new Error(await r.text());
	      return r.json();
	    }

	    function escapeHtml(value) {
	      return String(value ?? '').replace(/[&<>"']/g, ch => ({
	        '&': '&amp;',
	        '<': '&lt;',
	        '>': '&gt;',
	        '"': '&quot;',
	        "'": '&#39;',
	      }[ch]));
	    }

	    function escapeAttr(value) {
	      return escapeHtml(value);
	    }

	    function jsArg(value) {
	      return escapeAttr(JSON.stringify(String(value ?? '')));
	    }

	    function safeUrl(value) {
	      const text = String(value ?? '').trim();
	      if (!text) return '';
	      try {
	        const url = new URL(text);
	        return (url.protocol === 'http:' || url.protocol === 'https:') ? url.href : '';
	      } catch (e) {
	        return '';
	      }
	    }

	    function firstSafeUrl(...values) {
	      for (const value of values) {
	        const url = safeUrl(value);
	        if (url) return url;
	      }
	      return '';
	    }

	    function safeCssColor(value) {
	      const text = String(value ?? '').trim();
	      if (/^#[0-9a-fA-F]{3}([0-9a-fA-F]{3})?$/.test(text)) return text;
	      if (/^(rgb|hsl)a?\([0-9.% ,+-]+\)$/.test(text)) return text;
	      return '';
	    }

    function toast(msg, type='success') {
      const el = document.createElement('div');
      el.className = 'toast ' + type;
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => {
        el.style.animation = 'none';
        el.style.opacity = '0';
        el.style.transform = 'translateY(8px)';
        el.style.transition = 'opacity 0.2s, transform 0.2s';
        setTimeout(() => el.remove(), 200);
      }, 2500);
    }

    function switchTab(tab) {
      currentTab = tab;
      currentOffset = 0;
      document.querySelectorAll('.tab-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.tab === tab);
      });
      loadPapers();
    }

    async function recommendPapers() {
      const btn = document.getElementById('recommend-btn');
      btn.disabled = true;
      btn.textContent = 'Recommending...';
      try {
        const r = await fetch(API + '/api/recommend', { method: 'POST' });
        if (!r.ok) throw new Error(await r.text());
        const data = await r.json();
        toast(`Recommended: ${data.count} papers`);
        await loadStats();
        await loadRecentReads();
        await loadPapers();
      } catch (e) {
        toast(e.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '✨ Recommend';
      }
    }

    async function updatePapers() {
      const btn = document.getElementById('update-btn');
      btn.disabled = true;
      btn.textContent = 'Updating...';
      try {
        const r = await fetch(API + '/api/update', { method: 'POST' });
        if (!r.ok) throw new Error(await r.text());
        const data = await r.json();
        toast(`Updated: ${data.inserted} inserted, ${data.updated} updated (${data.range})`);
        await loadStats();
        await loadPapers();
      } catch (e) {
        toast(e.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '🔄 Fetch';
      }
    }

    async function loadStats() {
      const s = await api('/api/stats');
      const grid = document.getElementById('stats-grid');
	      const items = [
	        { n: s.total_papers || 0, l: 'Total' },
	        { n: s.pending || 0, l: 'Pending' },
	        { n: s.recommended || 0, l: 'Recommended' },
	        { n: s.read || 0, l: 'Read' },
	        { n: s.starred || 0, l: 'Starred' },
        { n: s.skipped || 0, l: 'Skipped' },
      ];

      // Render stat cards
      grid.innerHTML = items.map(i =>
        `<div class="stat-card"><div class="number">${i.n}</div><div class="label">${i.l}</div></div>`
      ).join('');

      // Render track pills next to buttons
      const pillsEl = document.getElementById('track-pills');
	      if (pillsEl && s.by_track) {
	        const tracks = Object.entries(s.by_track)
	          .filter(([t]) => !t.includes(','))
	          .sort((a, b) => b[1] - a[1]);
	        pillsEl.innerHTML = tracks.map(([t, c]) =>
	          `<span class="track-pill"><span class="track-tag ${escapeAttr(t.toLowerCase())}">${escapeHtml(t)}</span> <span class="count">${escapeHtml(c)}</span></span>`
	        ).join('');
	      }
    }

    async function loadRecentReads() {
      const rows = await api('/api/recent-reads?limit=3');
      const el = document.getElementById('recent-reads');
      if (!rows || !rows.length) { el.innerHTML = '<div class="empty-msg">No recent reads.</div>'; return; }

      el.innerHTML = rows.map((p, i) => {
        let authors = p.authors;
        if (typeof authors === 'string') { try { authors = JSON.parse(authors); } catch(e){} }
        const authorStr = (Array.isArray(authors) ? authors.slice(0,3).join(', ') : (authors||''));
        const extraAuthors = Array.isArray(authors) && authors.length > 3 ? ', et al.' : '';
	        const dateStr = p.publication_date || p.publication_year || '?';
	        const abstract = p.abstract || '';
	        const absDisplay = abstract.length > 2000 ? abstract.slice(0, 2000) + '...' : abstract;
	        const markTime = p.changed_at ? `Marked: ${p.changed_at}` : '';
	        const paperId = jsArg(p.id);

	        return `<div class="recent-read-card">
	          <div class="recent-read-title"><span class="recent-read-rank">#${i+1}</span> <a onclick="showPaperDetail(${paperId})">${escapeHtml(p.title||'Untitled')}</a></div>
	          <div class="paper-meta">${escapeHtml(authorStr)}${escapeHtml(extraAuthors)}</div>
	          <div class="paper-meta">${venueTag(p.venue_abbr, p.tier)} ${trackTag(p.track)} ${escapeHtml(dateStr)} <span class="sep">·</span> ${escapeHtml(p.venue||'Unknown')} <span class="sep">·</span> Cited ${escapeHtml(p.cited_by_count||0)} <span class="sep">·</span> Score ${escapeHtml((p.score||0).toFixed(1))}</div>
	          ${markTime ? `<div class="paper-meta" style="opacity:0.6;">${escapeHtml(markTime)}</div>` : ''}
	          ${absDisplay ? `<div class="recent-read-abstract">${escapeHtml(absDisplay)}</div>` : ''}
	        </div>`;
	      }).join('');
	    }

	    function statusBadge(st) {
	      const display = st || 'pending';
	      const map = {
	        pending: { icon: '⏳', text: 'Pending', cls: 'badge-pending' },
	        recommended: { icon: '◆', text: 'Recommended', cls: 'badge-recommended' },
	        read: { icon: '✓', text: 'Read', cls: 'badge-read' },
	        starred: { icon: '★', text: 'Starred', cls: 'badge-starred' },
	        skip: { icon: '✕', text: 'Skip', cls: 'badge-skip' }
	      };
	      const info = map[display] || { icon: '', text: display, cls: 'badge-pending' };
	      return `<span class="badge ${escapeAttr(info.cls)}">${escapeHtml(info.icon)} ${escapeHtml(info.text)}</span>`;
	    }

	    function trackTag(track) {
	      const name = track || '?';
	      const lower = name.toLowerCase();
	      // Use dynamic class based on track name
	      const cls = 'track-' + lower.replace(/[^a-z0-9]/g, '-');
	      return `<span class="track-tag ${escapeAttr(cls)}">${escapeHtml(name)}</span>`;
	    }

	    function venueTag(venue_abbr, tier) {
	      const abbr = venue_abbr || 'Others';
	      if (abbr === 'Others') {
	        return `<span class="venue-tag others">${escapeHtml(abbr)}</span>`;
	      }
	      if (abbr === 'arXiv') {
	        return `<span class="venue-tag arxiv">${escapeHtml(abbr)}</span>`;
	      }
	      const t = tier || '0';
	      return `<span class="venue-tag t${escapeAttr(t)}">${escapeHtml(abbr)}</span>`;
	    }

    async function markPaper(id, status) {
      try {
        await postApi('/api/mark', { id, status });
        toast(`Marked as ${status}`);
        loadPapers();
        loadStats();
      } catch (e) {
        toast(e.message, 'error');
      }
    }

    async function showPaperDetail(id) {
      try {
        const p = await api(`/api/paper/${encodeURIComponent(id)}`);
        if (!p) { toast('Paper not found', 'error'); return; }

        currentPaperId = id;
        document.getElementById('modal-title').textContent = p.title || 'Untitled';

        let authors = p.authors;
        if (typeof authors === 'string') { try { authors = JSON.parse(authors); } catch(e){} }
	        const authorStr = (Array.isArray(authors) ? authors.join(', ') : (authors||'Unknown'));
	        const dateStr = p.publication_date || p.publication_year || '?';
	        const metaHtml = `${venueTag(p.venue_abbr, p.tier)} ${trackTag(p.track)} ${escapeHtml(dateStr)} · ${escapeHtml(p.venue||'Unknown')} · Cited ${escapeHtml(p.cited_by_count||0)} · Score ${escapeHtml((p.score||0).toFixed(1))}`;
	        document.getElementById('modal-meta').innerHTML = metaHtml;
	        document.getElementById('modal-authors').textContent = authorStr;
	        document.getElementById('modal-abstract').textContent = p.abstract || 'No abstract available.';

	        const url = firstSafeUrl(p.landing_page_url, p.doi, p.id);
	        document.getElementById('modal-links').innerHTML = url
	          ? `<a href="${escapeAttr(url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(url)}</a>`
	          : '<em style="color:var(--text-muted)">No link available</em>';

	        const st = p.status || 'pending';
	        const paperId = jsArg(p.id);
	        const actionBtns = [
	          st === 'read'
	            ? `<button onclick="markPaperFromModal(${paperId},'pending')" class="btn btn-ghost">↩ Unread</button>`
	            : `<button onclick="markPaperFromModal(${paperId},'read')" class="btn btn-primary">✓ Read</button>`,
	          st === 'starred'
	            ? `<button onclick="markPaperFromModal(${paperId},'pending')" class="btn btn-ghost">↩ Unstar</button>`
	            : `<button onclick="markPaperFromModal(${paperId},'starred')" class="btn btn-secondary">★ Star</button>`,
	          st === 'skip'
	            ? `<button onclick="markPaperFromModal(${paperId},'pending')" class="btn btn-ghost">↩ Unskip</button>`
	            : `<button onclick="markPaperFromModal(${paperId},'skip')" class="btn btn-ghost">✕ Skip</button>`,
	          `<button onclick="translatePaper(${paperId})" class="btn btn-secondary">🌐 Translate</button>`,
	          `<button onclick="resolvePdf(${paperId})" class="btn btn-secondary">📄 PDF</button>`,
	          `<button onclick="copyBibTeX(${paperId})" class="btn btn-secondary">📋 BibTeX</button>`,
	        ];
        document.getElementById('modal-actions').innerHTML = actionBtns.join('');

        // Load note
        try {
          const noteData = await api(`/api/paper/${encodeURIComponent(id)}/note`);
          document.getElementById('modal-note-input').value = noteData.note || '';
        } catch (e) {
          document.getElementById('modal-note-input').value = '';
        }
        const saveBtn = document.getElementById('modal-note-save');
        if (saveBtn) saveBtn.textContent = 'Save Note';

        document.getElementById('paper-modal').classList.add('active');
        document.body.style.overflow = 'hidden';
      } catch (e) {
        toast(e.message, 'error');
      }
    }

    function generateBibTeX(p) {
      let authors = p.authors;
      if (typeof authors === 'string') { try { authors = JSON.parse(authors); } catch(e){} }
      let citeKey = 'unknown';
      if (Array.isArray(authors) && authors.length > 0) {
        const firstAuthor = authors[0];
        const lastName = firstAuthor.split(' ').pop() || 'unknown';
        citeKey = lastName.toLowerCase().replace(/[^a-z]/g, '') + String(p.publication_year || '0000');
      } else if (p.publication_year) {
        citeKey = 'paper' + p.publication_year;
      }

      let bib = `@article{${citeKey},\n`;
      bib += `  title = {${p.title || ''}},\n`;

      if (Array.isArray(authors) && authors.length > 0) {
        bib += `  author = {${authors.join(' and ')}},\n`;
      }

      if (p.publication_year) {
        bib += `  year = {${p.publication_year}},\n`;
      }

      if (p.venue) {
        bib += `  journal = {${p.venue}},\n`;
      }

      if (p.doi) {
        bib += `  doi = {${p.doi}},\n`;
      }

      if (p.id && p.id.startsWith('https://')) {
        bib += `  url = {${p.id}},\n`;
      } else if (p.landing_page_url) {
        bib += `  url = {${p.landing_page_url}},\n`;
      }

      bib += `}`;
      return bib;
    }

    async function translatePaper(paperId) {
      try {
        toast('Translating...', 'success');
        const data = await fetch(API + `/api/paper/${encodeURIComponent(paperId)}/translate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
        });
        if (!data.ok) throw new Error(await data.text());
        const result = await data.json();
        if (result.title_zh) {
          // Show translation in modal
          const titleEl = document.getElementById('modal-title');
          const abstractEl = document.getElementById('modal-abstract');
	          if (titleEl) {
	            titleEl.innerHTML = `<div style="margin-bottom:0.5rem;">${escapeHtml(titleEl.textContent)}</div><div style="color:var(--accent);font-size:1.05rem;font-weight:600;">${escapeHtml(result.title_zh)}</div>`;
	          }
	          if (abstractEl && result.abstract_zh) {
	            abstractEl.innerHTML = `<div style="margin-bottom:0.5rem;color:var(--text-secondary);">${escapeHtml(abstractEl.textContent)}</div><div style="color:var(--text-primary);line-height:1.65;">${escapeHtml(result.abstract_zh)}</div>`;
	          }
          toast(result.source === 'cache' ? 'Translation loaded from cache' : 'Translation complete');
        } else {
          toast('Translation failed', 'error');
        }
      } catch (e) {
        toast(e.message, 'error');
      }
    }

    async function resolvePdf(paperId) {
      try {
        toast('Resolving PDF...', 'success');
        const data = await fetch(API + `/api/paper/${encodeURIComponent(paperId)}/resolve-pdf`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
        });
        if (!data.ok) throw new Error(await data.text());
        const result = await data.json();
	        const pdfUrl = safeUrl(result.pdf_url);
	        if (pdfUrl) {
	          window.open(pdfUrl, '_blank', 'noopener');
          toast(`PDF opened (${result.pdf_source})`);
        } else {
          toast('No open-access PDF found', 'error');
        }
      } catch (e) {
        toast(e.message, 'error');
      }
    }

    async function copyBibTeX(paperId) {
      try {
        const p = await api(`/api/paper/${encodeURIComponent(paperId)}`);
        if (!p) { toast('Paper not found', 'error'); return; }
        const bib = generateBibTeX(p);
        try {
          await navigator.clipboard.writeText(bib);
          toast('BibTeX copied to clipboard');
          return;
        } catch (clipErr) {
          // Fallback for non-HTTPS contexts
        }
        const ta = document.createElement('textarea');
        ta.value = bib;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        let ok = false;
        try {
          ok = document.execCommand('copy');
        } catch (execErr) {
          ok = false;
        }
        document.body.removeChild(ta);
        if (ok) {
          toast('BibTeX copied to clipboard');
        } else {
          toast('Failed to copy BibTeX', 'error');
        }
      } catch (e) {
        toast(e.message, 'error');
      }
    }

    async function savePaperNote() {
      if (!currentPaperId) return;
      const note = document.getElementById('modal-note-input').value;
      const saveBtn = document.getElementById('modal-note-save');
      const originalText = saveBtn ? saveBtn.textContent : 'Save Note';
      if (saveBtn) {
        saveBtn.disabled = true;
        saveBtn.textContent = 'Saving...';
      }
      try {
        await postApi(`/api/paper/${encodeURIComponent(currentPaperId)}/note`, { note });
        toast('Note saved');
        if (saveBtn) saveBtn.textContent = 'Saved!';
        setTimeout(() => { if (saveBtn) saveBtn.textContent = 'Save Note'; }, 1500);
      } catch (e) {
        toast(e.message, 'error');
        if (saveBtn) saveBtn.textContent = originalText;
      } finally {
        if (saveBtn) saveBtn.disabled = false;
      }
    }

    function hidePaperDetail() {
      document.getElementById('paper-modal').classList.remove('active');
      document.body.style.overflow = '';
    }

    function closeModal(event) {
      if (event.target === document.getElementById('paper-modal')) {
        hidePaperDetail();
      }
    }

    async function markPaperFromModal(id, status) {
      await markPaper(id, status);
      hidePaperDetail();
    }

    // Close modal on Escape key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') hidePaperDetail();
    });

    async function loadPapers() {
      const keyword = document.getElementById('keyword').value;
      const track = document.getElementById('track-filter').value;
      const sortBy = document.getElementById('sort-by').value;
      const sortOrder = document.getElementById('sort-order').value;
      let status = currentTab;
      if (status === 'all') status = '';

      let qs = `limit=${PAGE_SIZE}&offset=${currentOffset}`;
      if (track) qs += `&track=${encodeURIComponent(track)}`;
      if (status) qs += `&status=${encodeURIComponent(status)}`;
      if (keyword) qs += `&keyword=${encodeURIComponent(keyword)}`;
      qs += `&sort_by=${encodeURIComponent(sortBy)}`;
      qs += `&sort_order=${encodeURIComponent(sortOrder)}`;

      const data = await api(`/api/papers?${qs}`);
      currentTotal = data.total;
      const countEl = document.getElementById('paper-count');
      if (countEl) countEl.textContent = `${data.total.toLocaleString()} papers`;
      const el = document.getElementById('papers-list');

      if (!data.papers || !data.papers.length) {
        el.innerHTML = '<div class="empty-msg">No papers found.</div>';
        document.getElementById('pagination').innerHTML = '';
        return;
      }

      el.innerHTML = data.papers.map(p => {
        let authors = p.authors;
        if (typeof authors === 'string') { try { authors = JSON.parse(authors); } catch(e){} }
	        const authorStr = (Array.isArray(authors) ? authors.slice(0,3).join(', ') : (authors||''));
	        const extraAuthors = Array.isArray(authors) && authors.length > 3 ? ', et al.' : '';
	        const dateStr = p.publication_date || p.publication_year || '?';
	        const meta = [
	          escapeHtml(dateStr),
	          escapeHtml(p.venue||'Unknown'),
	          `Cited ${escapeHtml(p.cited_by_count||0)}`,
	          `Score ${escapeHtml((p.score||0).toFixed(1))}`,
	        ].join(' <span class="sep">·</span> ');
	        const paperId = jsArg(p.id);

	        const st = p.status || 'pending';
	        const actionBtns = [
	          st === 'read'
	            ? `<button onclick="markPaper(${paperId},'pending')" class="btn btn-ghost">↩ Unread</button>`
	            : `<button onclick="markPaper(${paperId},'read')" class="btn btn-primary btn-sm">✓ Read</button>`,
	          st === 'starred'
	            ? `<button onclick="markPaper(${paperId},'pending')" class="btn btn-ghost">↩ Unstar</button>`
	            : `<button onclick="markPaper(${paperId},'starred')" class="btn btn-secondary btn-sm">★ Star</button>`,
	          st === 'skip'
	            ? `<button onclick="markPaper(${paperId},'pending')" class="btn btn-ghost">↩ Unskip</button>`
	            : `<button onclick="markPaper(${paperId},'skip')" class="btn btn-ghost btn-sm">✕ Skip</button>`,
	        ];

	        return `<div class="paper-row">
	          <div class="paper-content">
	            <div class="paper-title">${statusBadge(p.status||'pending')} <a onclick="showPaperDetail(${paperId})">${escapeHtml(p.title||'Untitled')}</a></div>
	            <div class="paper-meta">${escapeHtml(authorStr)}${escapeHtml(extraAuthors)}</div>
	            <div class="paper-meta">${venueTag(p.venue_abbr, p.tier)} ${trackTag(p.track)} ${meta}</div>
	          </div>
          <div class="paper-actions">${actionBtns.join('')}</div>
        </div>`;
      }).join('');

      // pagination
      const totalPages = Math.ceil(data.total / PAGE_SIZE);
      const currentPage = Math.floor(currentOffset / PAGE_SIZE) + 1;
      let pgHtml = '';

      if (currentPage > 1) {
        pgHtml += `<button class="page-btn" onclick="goPage(${currentOffset - PAGE_SIZE})">‹ Prev</button>`;
      }

      let start = 1, end = totalPages;
      if (totalPages > 5) {
        if (currentPage <= 3) { start = 1; end = 5; }
        else if (currentPage >= totalPages - 2) { start = totalPages - 4; end = totalPages; }
        else { start = currentPage - 2; end = currentPage + 2; }
      }
      for (let p = start; p <= end; p++) {
        const off = (p - 1) * PAGE_SIZE;
        const cls = p === currentPage ? 'page-btn active' : 'page-btn';
        pgHtml += `<button class="${cls}" onclick="goPage(${off})">${p}</button>`;
      }

      if (currentPage < totalPages) {
        pgHtml += `<button class="page-btn" onclick="goPage(${currentOffset + PAGE_SIZE})">Next ›</button>`;
      }

      if (totalPages > 1) {
        pgHtml += `
          <div class="page-jump">
            <input type="number" id="jump-page" min="1" max="${totalPages}" placeholder="#" onkeydown="if(event.key==='Enter')jumpToPage()">
            <button class="page-btn" onclick="jumpToPage()">Go</button>
          </div>`;
      }

      document.getElementById('pagination').innerHTML = pgHtml;
    }

    function goPage(offset) {
      currentOffset = offset;
      loadPapers();
      window.scrollTo({ top: document.querySelector('.section:last-of-type').offsetTop - 20, behavior: 'smooth' });
    }

    function jumpToPage() {
      const input = document.getElementById('jump-page');
      if (!input) return;
      const page = parseInt(input.value, 10);
      const totalPages = Math.ceil(currentTotal / PAGE_SIZE);
      if (!page || page < 1 || page > totalPages) {
        toast(`Enter a page between 1 and ${totalPages}`, 'error');
        return;
      }
      currentOffset = (page - 1) * PAGE_SIZE;
      loadPapers();
    }

    async function loadRecommendationHistory() {
      try {
        const rows = await api('/api/recommendations?days=3');
        const el = document.getElementById('recommendation-history');
        if (!rows || !rows.length) {
          el.innerHTML = '<div class="empty-msg">No recommendations yet.</div>';
          return;
        }

        // Group by date
        const byDate = {};
        for (const r of rows) {
          if (!byDate[r.date]) byDate[r.date] = [];
          byDate[r.date].push(r);
        }

        // Sort dates descending
        const dates = Object.keys(byDate).sort((a, b) => b.localeCompare(a));

        el.innerHTML = dates.map(date => {
          const items = byDate[date].sort((a, b) => (a.slot_index||0) - (b.slot_index||0));
          const isToday = date === new Date().toISOString().slice(0, 10);
          const dateLabel = isToday ? `${date} (Today)` : date;

	          const itemsHtml = items.map((item, i) => {
	            return `<div class="history-item">
	              <div style="display:flex;align-items:center;gap:0.5rem;flex:1;min-width:0;">
	                <span class="history-item-rank">#${i + 1}</span>
	                <span class="history-item-title" onclick="showPaperDetail(${jsArg(item.paper_id)})">${escapeHtml(item.title || 'Untitled')}</span>
	              </div>
	              <div class="history-item-meta">
	                ${trackTag(item.track)}
	                <span class="history-item-score">${escapeHtml((item.score||0).toFixed(1))}</span>
	              </div>
	            </div>`;
	          }).join('');

	          return `<details class="history-group" ${isToday ? 'open' : ''}>
	            <summary class="history-summary">${escapeHtml(dateLabel)}</summary>
	            <div class="history-items">${itemsHtml}</div>
	          </details>`;
        }).join('');
      } catch (e) {
        document.getElementById('recommendation-history').innerHTML = '<div class="empty-msg">Failed to load history.</div>';
      }
    }

    async function loadConfig() {
      try {
        const cfg = await api('/api/config');
        TRACK_CONFIG = cfg.tracks || {};

        // Generate dynamic track styles
        const styleEl = document.createElement('style');
        styleEl.id = 'dynamic-track-styles';
        let css = '';
        Object.entries(TRACK_CONFIG).forEach(([name, info], idx) => {
          const lower = name.toLowerCase().replace(/[^a-z0-9]/g, '-');
          const cls = `.track-tag.track-${lower}`;
          // Use configured color or generate from HSL palette
          let bg, fg;
	          const configColor = safeCssColor(info.color);
	          if (configColor) {
	            bg = configColor;
	            fg = '#fff';
	          } else {
	            const hue = (idx * 137) % 360; // golden angle for distinct colors
	            bg = `hsl(${hue}, 55%, 35%)`;
	            fg = `hsl(${hue}, 70%, 90%)`;
	          }
	          css += `${cls} { background: ${bg}; color: ${fg}; }\n`;
	          if (!configColor) {
	            const hue = (idx * 137) % 360;
	            const lightBg = `hsl(${hue}, 50%, 92%)`;
	            const lightFg = `hsl(${hue}, 70%, 25%)`;
	            css += `[data-theme="light"] ${cls} { background: ${lightBg}; color: ${lightFg}; }\n`;
          }
        });
        styleEl.textContent = css;
        document.head.appendChild(styleEl);

        // Populate track filter dropdown
        const filterSel = document.getElementById('track-filter');
	        if (filterSel) {
	          // Keep "All Tracks" option, add dynamic ones
	          filterSel.innerHTML = '<option value="">All Tracks</option>' +
	            Object.keys(TRACK_CONFIG).map(t => `<option value="${escapeAttr(t)}">${escapeHtml(t)}</option>`).join('');
	        }
      } catch (e) {
        console.error('Failed to load config:', e);
      }
    }

    async function init() {
      document.getElementById('last-updated').textContent = new Date().toLocaleString();
      await loadConfig();
      await loadStats();
      await loadRecommendationHistory();
      await loadRecentReads();
      await loadPapers();
    }

    // Auto-refresh when filter/sort changes
    let keywordTimer;
    document.getElementById('keyword').addEventListener('input', () => {
      clearTimeout(keywordTimer);
      keywordTimer = setTimeout(() => { currentOffset = 0; loadPapers(); }, 300);
    });
    document.getElementById('track-filter').addEventListener('change', () => { currentOffset = 0; loadPapers(); });
    document.getElementById('sort-by').addEventListener('change', () => { currentOffset = 0; loadPapers(); });
    document.getElementById('sort-order').addEventListener('change', () => { currentOffset = 0; loadPapers(); });

    init();
  </script>
